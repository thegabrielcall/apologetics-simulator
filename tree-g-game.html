<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tree G — Conversation Simulator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0b0b14;color:#f0ede8;font-family:'Georgia',serif}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh;max-width:760px;margin:0 auto;padding:0 16px}

/* ── Header ── */
#header{padding:14px 0 10px;flex-shrink:0}
#title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
#game-title{font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;font-family:'Courier New',monospace;color:#666}
#restart-btn{font-size:0.62rem;font-family:'Courier New',monospace;letter-spacing:0.1em;text-transform:uppercase;color:#444;background:none;border:1px solid #2a2a3a;padding:4px 10px;border-radius:20px;cursor:pointer;transition:all .2s}
#restart-btn:hover{color:#e8c97a;border-color:#e8c97a55}

/* ── Tier progress ── */
#tier-track{display:flex;gap:4px;align-items:center}
.tier-dot{width:18px;height:4px;border-radius:2px;background:#1c1c28;transition:background .4s,width .3s}
.tier-dot.active{background:#e8c97a}
.tier-dot.done{background:#6ad49088}
.tier-dot.outcome-dot{width:28px;background:#1c1c28}
.tier-dot.outcome-dot.active{background:#b06ad4}
#tier-label{font-size:0.6rem;font-family:'Courier New',monospace;color:#555;margin-left:8px;letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap}

/* ── Chat area ── */
#chat-area{flex:1;overflow-y:auto;padding:12px 0 8px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
#chat-area::-webkit-scrollbar{width:3px}
#chat-area::-webkit-scrollbar-track{background:transparent}
#chat-area::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}

/* ── Bubbles ── */
.bubble-wrap{display:flex;opacity:0;transform:translateY(8px);transition:opacity .35s ease,transform .35s ease}
.bubble-wrap.visible{opacity:1;transform:none}
.bubble-wrap.you-wrap{justify-content:flex-start}
.bubble-wrap.them-wrap{justify-content:flex-end}
.bubble{max-width:68%;padding:11px 15px;border-radius:12px;font-size:0.82rem;line-height:1.6;position:relative}
.you-wrap .bubble{border-top-left-radius:3px}
.them-wrap .bubble{border-top-right-radius:3px}

/* tier color classes */
.tb-1{background:#1a2e38;border:1.5px solid #6ab8d4;color:#b8dfe8}
.tb-2{background:#2e1a1a;border:1.5px solid #d46a6a;color:#e8b8b8}
.tb-3{background:#1a2e22;border:1.5px solid #6ad490;color:#b8e8c8}
.tb-4{background:#2e271a;border:1.5px solid #d4a86a;color:#e8d8b8}
.tb-5{background:#1a222e;border:1.5px solid #6a90d4;color:#b8c8e8}
.tb-6{background:#2a1f2e;border:1.5px solid #b06ad4;color:#ddb8e8}
.tb-7{background:#2e2a1a;border:1.5px solid #d4d06a;color:#e8e4b8}
.tb-8{background:#2e1a24;border:1.5px solid #d46aaa;color:#e8b8d4}
.tb-9{background:#1a2e2e;border:1.5px solid #6ad4d4;color:#b8e8e8}
.tb-10{background:#2e221a;border:1.5px solid #d4906a;color:#e8ccb8}
.tb-11{background:#1e1a2e;border:1.5px solid #9a8fd4;color:#ccc8e8}

.tier-pip{display:inline-block;font-size:0.55rem;font-family:'Courier New',monospace;letter-spacing:0.07em;text-transform:uppercase;padding:2px 6px;border-radius:10px;margin-bottom:6px;border:1px solid;opacity:.8}

/* typing indicator */
.typing-wrap{display:flex;justify-content:flex-end;opacity:0;transition:opacity .3s}
.typing-wrap.visible{opacity:1}
.typing{background:#1e1e2e;border:1px solid #2a2a3a;border-radius:10px;border-top-right-radius:3px;padding:10px 16px;display:flex;gap:5px;align-items:center}
.typing-dot{width:6px;height:6px;border-radius:50%;background:#555;animation:bounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── Choices panel ── */
#choices-panel{flex-shrink:0;padding:10px 0 16px}
#choices-prompt{font-size:0.62rem;font-family:'Courier New',monospace;letter-spacing:0.1em;text-transform:uppercase;color:#555;margin-bottom:8px}
#choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.choice-btn{
  background:#111120;border:1.5px solid #2a2a3a;border-radius:10px;
  padding:12px 14px;cursor:pointer;text-align:left;
  transition:all .2s;position:relative;overflow:hidden
}
.choice-btn:hover{border-color:#6a90d455;background:#151528}
.choice-btn .choice-label{font-size:0.78rem;color:#ccc;line-height:1.4;margin-bottom:4px}
.choice-btn .choice-sub{font-size:0.68rem;color:#555;font-style:italic;line-height:1.3}
.choice-btn.selected{pointer-events:none}
.choice-btn.selected.tag-best{border-color:#6ad490;background:#1a2e1a}
.choice-btn.selected.tag-good{border-color:#6ab8d4;background:#1a2a30}
.choice-btn.selected.tag-risky{border-color:#d4a86a;background:#2e271a}
.choice-btn.selected.tag-wrong{border-color:#d46a6a;background:#2e1a1a}
.choice-btn.unselected{opacity:.3;pointer-events:none}
.tag-flash{
  display:none;position:absolute;top:8px;right:8px;
  font-size:0.55rem;font-family:'Courier New',monospace;letter-spacing:0.1em;
  text-transform:uppercase;padding:2px 7px;border-radius:10px;border:1px solid
}
.choice-btn.selected .tag-flash{display:block}
.tag-best .tag-flash{color:#6ad490;border-color:#6ad49050;background:#6ad49015}
.tag-good .tag-flash{color:#6ab8d4;border-color:#6ab8d450;background:#6ab8d415}
.tag-risky .tag-flash{color:#d4a86a;border-color:#d4a86a50;background:#d4a86a15}
.tag-wrong .tag-flash{color:#d46a6a;border-color:#d46a6a50;background:#d46a6a15}

/* ── Outcome screen ── */
#outcome-screen{
  display:none;position:fixed;inset:0;background:#0b0b14;
  flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;z-index:100;max-width:760px;margin:0 auto
}
#outcome-screen.show{display:flex}
.outcome-icon{font-size:3rem;margin-bottom:20px;animation:fadeUp .6s ease}
.outcome-title{font-size:1.4rem;color:#e8c97a;margin-bottom:12px;text-align:center;animation:fadeUp .6s .1s ease both}
.outcome-quote{
  max-width:560px;text-align:center;font-size:0.9rem;line-height:1.7;
  color:#ccc;margin-bottom:20px;animation:fadeUp .6s .2s ease both;
  border-left:3px solid #333;padding-left:16px;text-align:left
}
.outcome-note{font-size:0.72rem;font-style:italic;color:#666;margin-bottom:32px;text-align:center;animation:fadeUp .6s .3s ease both}
.outcome-path-summary{
  font-size:0.62rem;font-family:'Courier New',monospace;letter-spacing:0.08em;
  text-transform:uppercase;color:#444;margin-bottom:28px;text-align:center;
  animation:fadeUp .6s .35s ease both
}
.outcome-btns{display:flex;gap:12px;animation:fadeUp .6s .4s ease both}
.outcome-btn{
  background:#111120;border:1.5px solid #2a2a3a;border-radius:8px;
  padding:10px 22px;font-family:'Courier New',monospace;font-size:0.7rem;
  letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;color:#888;transition:all .2s
}
.outcome-btn:hover{color:#e8c97a;border-color:#e8c97a55}
.outcome-btn.primary{border-color:#6ad49055;color:#6ad490}
.outcome-btn.primary:hover{border-color:#6ad490;background:#1a2e1a}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ── Source badge ── */
.src{display:inline-block;font-size:0.55rem;font-family:'Courier New',monospace;
  background:#fff08;border:1px solid #fff18;border-radius:3px;padding:2px 5px;
  margin-top:7px;color:#888;display:block}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="title-row">
      <span id="game-title">Tree G · Conversation Simulator</span>
      <button id="restart-btn" onclick="restartGame()">↺ Restart</button>
    </div>
    <div id="tier-track">
      <!-- dots injected by JS -->
    </div>
  </div>
  <div id="chat-area"></div>
  <div id="choices-panel">
    <div id="choices-prompt"></div>
    <div id="choices-grid"></div>
  </div>
</div>

<div id="outcome-screen">
  <div class="outcome-icon" id="out-icon"></div>
  <div class="outcome-title" id="out-title"></div>
  <div class="outcome-quote" id="out-quote"></div>
  <div class="outcome-note" id="out-note"></div>
  <div class="outcome-path-summary" id="out-path"></div>
  <div class="outcome-btns">
    <button class="outcome-btn" onclick="restartGame()">↺ Try a different path</button>
    <button class="outcome-btn primary" onclick="closeOutcome()">← Read full conversation</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  GAME DATA
// ═══════════════════════════════════════════════════════════

const TIER_COLORS = ['','tb-1','tb-2','tb-3','tb-4','tb-5','tb-6','tb-7','tb-8','tb-9','tb-10','tb-11'];
const TIER_LABELS = ['','T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11'];

// node types: 'say' | 'pick' | 'outcome'
const nodes = {

  // ─── OPENING ───────────────────────────────────────────
  start: {
    type:'say', speaker:'you', tier:1,
    text: "Have you heard the Good News?",
    next:'t2_pick'
  },

  // ─── T2 CHOICE ─────────────────────────────────────────
  t2_pick:{
    type:'auto_pick', tier:2,
    prompt:'Choose how they respond...',
    choices:[
      { label:'"Church destroyed my family"', sub:'Financial exploitation — years of manipulation', next:'t2a', youText:null },
      { label:'"The church ruined my marriage"', sub:'Spiritual abuse tore their family apart', next:'t2b', youText:null },
      { label:'"I walked away 15 years ago"', sub:'Watched leaders destroy lives — never looked back', next:'t2c', youText:null },
      { label:'"A pastor hurt me as a teenager"', sub:'Personal trauma and betrayal at 14', next:'t2d', youText:null },
    ]
  },

  // ════════════════════════════════════════════════════════
  //  PATH A — Church destroyed my family
  // ════════════════════════════════════════════════════════
  t2a:{ type:'say', speaker:'them', tier:2,
    text:"I don't want to hear anything about God. The church destroyed my family. Years of manipulation, financial exploitation — they tore us apart. I watched every bit of it happen.",
    next:'t3a_pick'
  },
  t3a_pick:{
    type:'pick', tier:3, prompt:'How do you respond?',
    choices:[
      { label:'Lead with empathy', sub:'"I\'m sorry. Was it the institution or Jesus himself?"',
        tag:'best', next:'t4a_main',
        youText:"I'm so sorry. That's real, and it's not okay. Can I ask — was it the institution that hurt you, or Jesus himself?" },
      { label:'Point to Jesus\'s own record', sub:'"Jesus actually opposed religious institutions."',
        tag:'good', next:'t4a_ok',
        youText:"Jesus actually spent most of his time opposing religious institutions. He was killed by one." },
      { label:'Defend the church', sub:'"Not all churches are like that."',
        tag:'risky', next:'t4a_risky',
        youText:"Not all churches are like that — real ones don't act that way." },
      { label:'Dismiss the experience', sub:'"Those weren\'t real Christians."',
        tag:'wrong', next:'t4a_wrong',
        youText:"Those people weren't real Christians. You can't blame Jesus for what they did." },
    ]
  },

  // ── A main highway ──
  t4a_main:{ type:'say', speaker:'them', tier:4,
    text:"Same thing. Jesus, God, church — you can't separate them. One package deal. And that package deal destroyed everything.",
    next:'t5a_pick'
  },
  t5a_pick:{
    type:'pick', tier:5, prompt:'They pushed back. What do you say?',
    choices:[
      { label:'Cite Jesus\'s own words against leaders', sub:'"He called them whitewashed tombs — killed BY the church"',
        tag:'best', next:'t6a_main',
        youText:"I hear that. But the same Bible you're rejecting has Jesus calling religious leaders 'whitewashed tombs.' He was actually killed BY the religious establishment. He's on record opposing it." },
      { label:'Ask them to consider the distinction', sub:'"What if the institution got it wrong and Jesus is on your side?"',
        tag:'good', next:'t6a_ok',
        youText:"What if the institution got it completely wrong — and Jesus is actually on your side of this?" },
      { label:'Ask what happened', sub:'"Can you tell me what they actually did?"',
        tag:'risky', next:'t6a_story',
        youText:"Can you tell me more about what they actually did to your family?" },
      { label:'Validate their frustration', sub:'"You\'re right to be angry. The church has failed people."',
        tag:'wrong', next:'t6a_wrong',
        youText:"You're right to be angry. The church has failed a lot of people badly." },
    ]
  },
  t6a_main:{ type:'say', speaker:'them', tier:6,
    text:"So why did He allow them to build one in His name? Every corrupt church claims to follow Jesus. He had to have known this would happen.",
    next:'t7a_pick'
  },
  t7a_pick:{
    type:'pick', tier:7, prompt:'One of the deepest questions. How do you answer?',
    choices:[
      { label:'Jesus predicted this exact thing', sub:'"He warned about wolves in sheep\'s clothing before it happened"',
        tag:'best', next:'t8a_main',
        youText:"That's one of the most honest questions anyone could ask. And Jesus predicted it — He warned about wolves in sheep's clothing, false prophets inside the church. The corruption you witnessed? He named it before it happened." },
      { label:'Separate institution from relationship', sub:'"He never designed a corporation. He wanted relationship."',
        tag:'good', next:'t8a_ok',
        youText:"He didn't design the institution. He designed relationship. Everything built on top of that — the buildings, the hierarchy, the power structures — that was human. And humans corrupt things." },
      { label:'Free will defense', sub:'"God allows people to abuse even His own name."',
        tag:'risky', next:'t8a_risky',
        youText:"God allows human free will, which means people can abuse things — even His own name. That's not His design, it's the cost of genuine freedom." },
      { label:'Concede the point', sub:'"That\'s fair — the church has failed a lot of people."',
        tag:'wrong', next:'outcome_away_cold',
        youText:"That's a fair point. The church has failed a lot of people and I can't explain why God allowed it." },
    ]
  },
  t8a_main:{ type:'say', speaker:'them', tier:8,
    text:"...I didn't know that. I always thought the Bible just propped up whatever the church wanted to do.",
    next:'t9a_pick'
  },
  t9a_pick:{
    type:'pick', tier:9, prompt:'Something shifted. Build on it carefully.',
    choices:[
      { label:'Show Jesus is on their side', sub:'"The prophets, Jesus, Paul — they critiqued religious power. He would weep over this."',
        tag:'best', next:'t10a_main',
        youText:"It does the opposite in most places. The prophets, Jesus, Paul — they spent most of their words critiquing the religious power of their day. The church hurt you. Jesus is the one who would weep over that. He has a track record of weeping." },
      { label:'Invite them to read it themselves', sub:'"The Bible is actually more critical of religion than any atheist."',
        tag:'good', next:'t10a_ok',
        youText:"The Bible is actually the most scathing critique of religious power ever written. You wouldn't know that from the people who weaponized it — but it's there. You could read it for yourself, on your own terms." },
      { label:'Ask what it would mean', sub:'"What if Jesus is completely different from what hurt you?"',
        tag:'risky', next:'t10a_risky',
        youText:"What would it mean to you, if Jesus turned out to be completely different from what hurt you?" },
      { label:'Pivot to making it right', sub:'"What would you need to see to trust again?"',
        tag:'risky', next:'t10a_trust',
        youText:"What would you need to see to be able to trust again?" },
    ]
  },
  t10a_main:{ type:'say', speaker:'them', tier:10,
    text:"If He weeps over it... maybe He's not the same as them. I've been carrying anger at a face that might not even be His face. I think I've been blaming the wrong person for years.",
    next:'t11a_pick'
  },
  t11a_pick:{
    type:'pick', tier:11, prompt:'This is the moment. Choose your final words.',
    choices:[
      { label:'Confirm who He really is', sub:'"He and the people who hurt you are on opposite sides of this story."',
        tag:'best', next:'outcome_pray_a',
        youText:"He is. The Jesus of the Bible wept, confronted the powerful, and was killed by them. Him and the people who hurt your family are on opposite sides of this story." },
      { label:'Give them space and an open door', sub:'"Read His actual words when you\'re ready."',
        tag:'good', next:'outcome_away_a',
        youText:"Take your time. Read His actual words when you're ready — not through anyone else's filter. The door is open." },
      { label:'Hold the moment gently', sub:'"There\'s no timeline. You\'ve been carrying this long enough."',
        tag:'good', next:'outcome_away_soft_a',
        youText:"You've been carrying this for a long time. There's grace for wherever you are right now. No timeline." },
      { label:'Push for a decision', sub:'"So does this mean you\'re ready to give faith a try?"',
        tag:'wrong', next:'outcome_pushed',
        youText:"So does this mean you're ready to give faith a try?" },
    ]
  },

  // ── A side paths ──
  t4a_ok:{ type:'say', speaker:'them', tier:4,
    text:"I've heard that. 'Jesus is different from the church.' But who speaks for Jesus? The church does. So how is He actually different if his followers act like this?",
    next:'t5a_ok_pick'
  },
  t5a_ok_pick:{
    type:'pick', tier:5, prompt:'Good question. How do you answer it?',
    choices:[
      { label:'Jesus\'s own words set the standard', sub:'"He predicted this failure himself — that\'s the difference."',
        tag:'best', next:'t6a_main',
        youText:"The difference is that Jesus himself predicted his followers would fail this way — and condemned it in advance. He said watch out for wolves in sheep's clothing. He wasn't surprised by this. He named it." },
      { label:'His historical record speaks', sub:'"He was killed by the same kind of leaders."',
        tag:'good', next:'t6a_main',
        youText:"He was killed by the same kind of religious leaders who hurt your family. That's the historical record. He's not on their side." },
      { label:'Invite them to read Jesus directly', sub:'"Read what Jesus said himself — not what the church said about him."',
        tag:'risky', next:'t8a_risky',
        youText:"Read what Jesus himself said — not what the church says about him. The words are preserved. You can go directly to the source." },
      { label:'Concede the difficulty', sub:'"That\'s a fair challenge. I don\'t have a clean answer."',
        tag:'wrong', next:'outcome_away_cold',
        youText:"That's a genuinely hard challenge and I don't have a clean answer for it." },
    ]
  },
  t4a_risky:{ type:'say', speaker:'them', tier:4,
    text:"Every church says 'we're the real ones.' That's exactly what my church said right up until everything fell apart. I've heard it from all of them.",
    next:'t5a_risky_pick'
  },
  t5a_risky_pick:{
    type:'pick', tier:5, prompt:'They shut that down. Can you recover?',
    choices:[
      { label:'Acknowledge they\'re right and redirect', sub:'"You\'re right. Jesus predicted exactly that."',
        tag:'best', next:'t6a_main',
        youText:"You're right, and I shouldn't have said it that way. Jesus himself said most religious leaders would be like that — He warned about it. He predicted your exact experience." },
      { label:'Apologize and reset', sub:'"That was defensive of me. I\'m sorry."',
        tag:'good', next:'t6a_main',
        youText:"That was the wrong thing to say — it was defensive of me and it dismissed what you went through. I'm sorry. What you experienced was real." },
      { label:'Keep defending churches', sub:'"But if you found the right one—"',
        tag:'wrong', next:'outcome_shutdown',
        youText:"But if you found the right community—" },
      { label:'Redirect to Jesus only', sub:'"Forget churches. What do you think of Jesus himself?"',
        tag:'risky', next:'t6a_ok',
        youText:"Forget churches entirely. What do you think of Jesus himself, separate from any institution?" },
    ]
  },
  t4a_wrong:{ type:'say', speaker:'them', tier:4,
    text:"Don't tell me they weren't real Christians. That's what every church person says about every other church. You're all the same. This conversation is over.",
    next:'outcome_shutdown'
  },

  // ── A branching nodes (merge back to main or end) ──
  t6a_ok:{ type:'say', speaker:'them', tier:6,
    text:"...Honestly? I think Jesus was probably a decent person. It's the institution I can't stand.",
    next:'t7a_ok_pick'
  },
  t7a_ok_pick:{
    type:'pick', tier:7, prompt:'They separated Jesus from the church. Explore that.',
    choices:[
      { label:'Build on that separation', sub:'"Then let\'s talk about Jesus himself, not the institution."',
        tag:'best', next:'t8a_ok',
        youText:"That's a meaningful distinction. Then let's talk about Jesus himself — his historical existence, what he actually said, what he claimed. Separate from any institution." },
      { label:'Ask what they think of his claims', sub:'"If he was decent, what do you make of his claims about himself?"',
        tag:'good', next:'t8a_ok',
        youText:"If Jesus was a decent person — and the historical record is clear he existed — what do you make of his claims about himself? He claimed to be God. That's hard to categorize as just 'decent.'" },
      { label:'Share evidence', sub:'"His existence is the most documented event in ancient history."',
        tag:'good', next:'t8a_ok',
        youText:"His existence is actually the most documented event in all of ancient history — more preserved than any Roman emperor. That's worth taking seriously." },
      { label:'Press for commitment', sub:'"So would you be open to exploring faith again?"',
        tag:'wrong', next:'outcome_away_cold',
        youText:"So would you be open to exploring faith again, starting with just Jesus?" },
    ]
  },
  t8a_ok:{ type:'say', speaker:'them', tier:8,
    text:"I've never actually looked at the historical record. I just lumped it all together. Maybe that's not fair.",
    next:'t9a_ok_pick'
  },
  t9a_ok_pick:{
    type:'pick', tier:9, prompt:'They\'re opening up. How do you respond?',
    choices:[
      { label:'Affirm them and give space', sub:'"That\'s honest. Take your time with the actual text."',
        tag:'best', next:'outcome_away_a',
        youText:"That's one of the most honest things someone can say. Take your time with his actual words — not filtered through anyone else. They've survived 24,600 manuscripts across centuries. They can handle your questions." },
      { label:'Share a specific reference', sub:'"Start with the Gospel of John. Just read what he said."',
        tag:'good', next:'outcome_away_a',
        youText:"Start with the Gospel of John. Just read what Jesus said in his own words. No commentary, no church. Just the words." },
      { label:'Invite them to pray now', sub:'"Would you want to say a short prayer right now?"',
        tag:'risky', next:'outcome_pushed',
        youText:"Would you want to say a short prayer right now? Even just to open the conversation with God?" },
      { label:'Give them the whole argument', sub:'"Here\'s what the evidence shows..."',
        tag:'wrong', next:'outcome_away_cold',
        youText:"Here's the thing — the manuscript evidence, the secular historians, the fulfilled prophecies—" },
    ]
  },
  t6a_risky:{ type:'say', speaker:'them', tier:6,
    text:"He predicted it? Like — Jesus actually said false prophets would show up inside the church?",
    next:'t7a_pick'

  t6a_story:{ type:'say', speaker:'them', tier:6,

// ═══════════════════════════════════════════════════════════
//  GAME ENGINE
// ═══════════════════════════════════════════════════════════

let currentNode = null;
let currentTier = 0;
let pathTaken = [];

function buildTierTrack(){
  const track = document.getElementById('tier-track');
  track.innerHTML = '';
  for(let i=1;i<=11;i++){
    const d = document.createElement('div');
    d.className='tier-dot';
    d.id='dot-'+i;
    track.appendChild(d);
  }
  const sep = document.createElement('div');
  sep.style.cssText='width:1px;height:12px;background:#2a2a3a;margin:0 2px';
  track.appendChild(sep);
  const od = document.createElement('div');
  od.className='tier-dot outcome-dot';
  od.id='dot-outcome';
  track.appendChild(od);
  const lbl = document.createElement('div');
  lbl.id='tier-label';
  lbl.textContent='Tier 1 / 11';
  track.appendChild(lbl);
}

function updateTierTrack(tier){
  for(let i=1;i<=11;i++){
    const d = document.getElementById('dot-'+i);
    if(!d) continue;
    d.className='tier-dot';
    if(i<tier) d.classList.add('done');
    else if(i===tier) d.classList.add('active');
  }
  const lbl = document.getElementById('tier-label');
  if(lbl) lbl.textContent = tier<=11 ? `Tier ${tier} / 11` : 'Outcome';
}

function appendBubble(speaker, text, tier, sourceHtml){
  const chat = document.getElementById('chat-area');
  const wrap = document.createElement('div');
  wrap.className = `bubble-wrap ${speaker==='you'?'you-wrap':'them-wrap'}`;
  const bub = document.createElement('div');
  const tc = TIER_COLORS[tier]||'tb-1';
  bub.className = `bubble ${tc}`;
  const pip = document.createElement('span');
  pip.className='tier-pip';
  pip.style.cssText = getBorderColor(tc);
  pip.textContent = `${TIER_LABELS[tier]} · ${speaker==='you'?'You':'Them'}`;
  bub.appendChild(pip);
  bub.appendChild(document.createElement('br'));
  const t = document.createElement('span');
  t.textContent = text;
  bub.appendChild(t);
  if(sourceHtml){
    const s=document.createElement('span');
    s.className='src'; s.innerHTML=sourceHtml;
    bub.appendChild(s);
  }
  wrap.appendChild(bub);
  chat.appendChild(wrap);
  requestAnimationFrame(()=>{ wrap.classList.add('visible'); });
  setTimeout(()=>{ chat.scrollTop=chat.scrollHeight; },50);
  return wrap;
}

function getBorderColor(tc){
  const map = {
    'tb-1':'color:#6ab8d4;border-color:#6ab8d440;background:#6ab8d415',
    'tb-2':'color:#d46a6a;border-color:#d46a6a40;background:#d46a6a15',
    'tb-3':'color:#6ad490;border-color:#6ad49040;background:#6ad49015',
    'tb-4':'color:#d4a86a;border-color:#d4a86a40;background:#d4a86a15',
    'tb-5':'color:#6a90d4;border-color:#6a90d440;background:#6a90d415',
    'tb-6':'color:#b06ad4;border-color:#b06ad440;background:#b06ad415',
    'tb-7':'color:#d4d06a;border-color:#d4d06a40;background:#d4d06a15',
    'tb-8':'color:#d46aaa;border-color:#d46aaa40;background:#d46aaa15',
    'tb-9':'color:#6ad4d4;border-color:#6ad4d440;background:#6ad4d415',
    'tb-10':'color:#d4906a;border-color:#d4906a40;background:#d4906a15',
    'tb-11':'color:#9a8fd4;border-color:#9a8fd440;background:#9a8fd415',
  };
  return map[tc]||'';
}

function showTyping(){
  const chat = document.getElementById('chat-area');
  const wrap = document.createElement('div');
  wrap.className='typing-wrap';
  wrap.id='typing-indicator';
  wrap.innerHTML='<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  chat.appendChild(wrap);
  requestAnimationFrame(()=>{ wrap.classList.add('visible'); });
  chat.scrollTop=chat.scrollHeight;
  return wrap;
}

function removeTyping(){
  const el=document.getElementById('typing-indicator');
  if(el){ el.style.opacity='0'; setTimeout(()=>el.remove(),300); }
}

function showChoices(node){
  const panel=document.getElementById('choices-panel');
  const prompt=document.getElementById('choices-prompt');
  const grid=document.getElementById('choices-grid');
  prompt.textContent = node.prompt || 'Choose a response...';
  grid.innerHTML='';
  node.choices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<div class="choice-label">${c.label}</div><div class="choice-sub">${c.sub||''}</div><span class="tag-flash">${c.tag||''}</span>`;
    if(c.tag) btn.dataset.tag=c.tag;
    btn.onclick=()=>handleChoice(node, c, i);
    grid.appendChild(btn);
  });
  panel.style.visibility='visible';
}

function hideChoices(){
  document.getElementById('choices-panel').style.visibility='hidden';
  document.getElementById('choices-grid').innerHTML='';
  document.getElementById('choices-prompt').textContent='';
}

async function handleChoice(node, choice, idx){
  // Style buttons
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach((b,i)=>{
    if(i===idx){ b.classList.add('selected','tag-'+(choice.tag||'good')); }
    else { b.classList.add('unselected'); }
  });
  // Show YOU bubble if youText exists
  if(choice.youText){
    await sleep(300);
    appendBubble('you', choice.youText, node.tier);
    pathTaken.push({tier:node.tier, tag:choice.tag, label:choice.label});
  }
  await sleep(600);
  hideChoices();
  await sleep(200);
  processNode(choice.next);
}

async function processNode(nodeId){
  if(!nodeId){ return; }
  const node = nodes[nodeId];
  if(!node){ console.warn('Missing node:',nodeId); return; }
  currentNode = node;

  if(node.type==='say'){
    currentTier = node.tier;
    updateTierTrack(node.tier);
    if(node.speaker==='them'){
      const typer=showTyping();
      await sleep(900+node.text.length*8);
      removeTyping();
      await sleep(100);
    }
    appendBubble(node.speaker, node.text, node.tier, node.src||null);
    await sleep(500);
    if(node.next){ processNode(node.next); }
  }
  else if(node.type==='pick'){
    currentTier = node.tier;
    updateTierTrack(node.tier);
    showChoices(node);
  }else if(node.type==='auto_pick'){processNode(node.choices[Math.floor(Math.random()*node.choices.length)].next);}
  else if(node.type==='outcome'){
    await sleep(400);
    showOutcome(node);
  }
}

function showOutcome(node){
  updateTierTrack(12);
  const dot=document.getElementById('dot-outcome');
  if(dot){ dot.classList.add('active'); }
  const lbl=document.getElementById('tier-label');
  if(lbl) lbl.textContent='Outcome';

  document.getElementById('out-icon').textContent=node.icon||'';
  document.getElementById('out-title').textContent=node.title||'';
  document.getElementById('out-quote').textContent=node.quote||'';
  document.getElementById('out-note').textContent=node.note||'';

  const pathSummary = pathTaken.map(p=>`T${p.tier}:${p.tag||'?'}`).join(' → ');
  document.getElementById('out-path').textContent = (node.path||'') + (pathSummary?' · '+pathSummary:'');

  const screen=document.getElementById('outcome-screen');
  screen.classList.add('show');

  const icon=document.getElementById('out-icon');
  if(node.outcome==='pray'){
    screen.style.borderTop='3px solid #6ad490';
  } else if(node.outcome==='shutdown'){
    screen.style.borderTop='3px solid #d46a6a';
  } else {
    screen.style.borderTop='3px solid #555';
  }
}

function closeOutcome(){
  document.getElementById('outcome-screen').classList.remove('show');
  const chat=document.getElementById('chat-area');
  chat.scrollTop=chat.scrollHeight;
}

function restartGame(){
  document.getElementById('outcome-screen').classList.remove('show');
  document.getElementById('chat-area').innerHTML='';
  pathTaken=[];
  currentTier=0;
  hideChoices();
  buildTierTrack();
  updateTierTrack(1);
  sleep(300).then(()=>processNode('start'));
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ── Init ──
buildTierTrack();
processNode('start');
</script>
